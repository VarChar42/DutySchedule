name: iOS TestFlight

on:
  workflow_dispatch: {}

jobs:
  beta:
    runs-on: macos-15
    timeout-minutes: 120
    defaults:
      run:
        working-directory: iosApp
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: iosApp

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode
        # The project targets iOS 26.0 (IPHONEOS_DEPLOYMENT_TARGET). If the
        # default Xcode on this runner doesn't include the iOS 26 SDK, pin one
        # explicitly, e.g.:
        #   sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      - name: Cache Gradle and Kotlin/Native
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-konan-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Run fastlane beta lane
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane beta
